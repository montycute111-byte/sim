<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Bank Game - Account Save</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <script src="/api/firebase-config.js"></script>
  <script src="firebase-config.js"></script>

  <main class="container">
    <section id="authScreen" class="card auth-screen">
      <h1>Sign In To Continue</h1>
      <p class="muted">Your progress is saved to your account and loads on any device.</p>

      <div class="field">
        <label for="usernameInput">Username</label>
        <input id="usernameInput" type="text" autocomplete="username" placeholder="your_username" />
      </div>

      <div class="field">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" />
      </div>

      <p id="authError" class="error"></p>
      <p id="setupMessage" class="error"></p>

      <div class="actions">
        <button id="loginBtn" class="btn">Log In</button>
        <button id="signupBtn" class="btn btn-secondary">Sign Up</button>
      </div>

      <hr />

      <div class="actions">
        <button id="guestBtn" class="btn btn-secondary">Play As Guest</button>
      </div>
    </section>

    <section id="gameScreen" class="hidden">
      <header class="card topbar">
        <div>
          <h2>Fake Bank Game</h2>
          <p id="whoami" class="muted">Not signed in</p>
          <p id="saveStatus" class="status saved">Saved</p>
        </div>
        <div class="actions">
          <button id="saveNowBtn" class="btn btn-secondary">Save Now</button>
          <button id="linkGuestBtn" class="btn btn-secondary hidden">Import Guest Progress</button>
          <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
      </header>

      <section class="grid">
        <article class="card">
          <h3>Dashboard</h3>
          <p>Balance: <strong id="balanceText">$0</strong></p>
          <p>Level: <strong id="levelText">1</strong></p>
          <p>XP: <strong id="xpText">0</strong></p>
          <p>Reputation: <strong id="repText">0</strong></p>
        </article>

        <article class="card">
          <h3>Main Job</h3>
          <p id="jobStatus">No active job</p>
          <p id="jobTimer" class="muted">--:--</p>
          <div class="actions">
            <button id="startJobBtn" class="btn">Start Job</button>
            <button id="claimJobBtn" class="btn btn-secondary" disabled>Claim Job</button>
          </div>
        </article>

        <article class="card">
          <h3>Actions</h3>
          <p class="muted">Critical actions save immediately.</p>
          <div class="actions">
            <button id="dailyBtn" class="btn">Claim Daily Bonus</button>
            <button id="buyItemBtn" class="btn btn-secondary">Buy Upgrade ($250)</button>
            <button id="resetProgressBtn" class="btn btn-danger">Reset Progress</button>
          </div>
        </article>

        <article class="card">
          <h3>Owned Items</h3>
          <ul id="inventoryList"></ul>
        </article>
      </section>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
